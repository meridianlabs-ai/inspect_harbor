# Per-dataset metadata overrides for Harbor datasets exposed by inspect_harbor.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  IMPORTANT: this file is a published interface, not just an internal    │
# │  config. Two consumers read it:                                         │
# │                                                                         │
# │    1. scripts/generate_tasks.py (this repo)                             │
# │         Reads `categories` per dataset to populate filter chips on      │
# │         the registry listing at docs/registry.qmd.                      │
# │                                                                         │
# │    2. inspect_ai's docs/evals/sync_harbor.py                            │
# │         Fetches this file over HTTP from                                │
# │         raw.githubusercontent.com/meridianlabs-ai/inspect_harbor/main/  │
# │         docs/overrides.yml                                              │
# │         and uses *all* fields (categories, arxiv, repo, tags, kind,     │
# │         modalities, contributors, title, desc, featured) to drive the   │
# │         evals browser at inspect.aisi.org.uk/evals.                     │
# │                                                                         │
# │  Consequences:                                                          │
# │    - Do NOT change the file path (docs/overrides.yml) without           │
# │      coordinating a matching PR against inspect_ai. The URL above is    │
# │      hardcoded there.                                                   │
# │    - Do NOT change the schema (add/rename/remove fields, alter types)   │
# │      without coordinating with inspect_ai. inspect_ai validates         │
# │      required fields and will fail its sync if the shape shifts. The   │
# │      safe change is: add a new *optional* field that old readers        │
# │      ignore.                                                            │
# │    - The category vocabulary is owned by inspect_ai (see                │
# │      docs/evals/sync.py:CATEGORY_VOCAB). We mirror it as a constant in  │
# │      scripts/validate_overrides.py and must keep it in sync if they     │
# │      extend the list.                                                   │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Keyed by dataset `name` (unversioned, as it appears in the Harbor registry).
# Every dataset in the Harbor registry should have an entry here. New entries
# are auto-stubbed by scripts/generate_tasks.py when Harbor adds a dataset;
# fill in the fields before merging the nightly PR. CI validation
# (scripts/validate_overrides.py) will block merges on unfilled stubs.
#
# Fields:
#   categories:   REQUIRED, non-empty. One or more of:
#                   Coding | Assistants | Reasoning | Knowledge |
#                   Cybersecurity | Safeguards | Science | Mathematics |
#                   Biology | Chemistry | Physics | Professional |
#                   Finance | Medicine | Law | Multimodal | Scheming |
#                   Behavior
#   arxiv:        arxiv paper URL                             (optional)
#   repo:         canonical upstream GitHub repo              (optional)
#   tags:         list of strings                             (optional)
#   kind:         agent|qa|generation|multimodal              (optional)
#   modalities:   list                                        (optional)
#   contributors: list of GitHub usernames                    (optional)
#   title:        override the auto-derived display title     (optional)
#   desc:         override the auto-derived description       (optional)
#   featured:     boolean                                     (optional)

