project:
  type: meridianlabs-ai/inspect-docs
  pre-render:
    # Refresh docs artifacts (registry-listing.yml + registry/*.qmd pages)
    # from the Harbor registry. --docs-only leaves src/inspect_harbor/_tasks.py
    # alone so local docs builds don't churn that file; the nightly cron is
    # what regenerates _tasks.py.
    - python ../scripts/generate_tasks.py --docs-only

inspect-docs:
  title: Inspect Harbor
  description: Inspect AI interface to Harbor tasks
  url: https://meridianlabs-ai.github.io/inspect_harbor
  module: inspect_harbor
  repo: meridianlabs-ai/inspect_harbor
  org: Meridian Labs
  external_refs:
    inspect_ai: https://inspect.aisi.org.uk
  navigation:
    - text: Getting Started
      href: index.qmd
    - text: Using Harbor
      contents:
        - href: datasets.qmd
        - href: parameters.qmd
        - href: agents.qmd
        - href: tasks.qmd
        - href: advanced.qmd
    - text: Registry
      href: registry.qmd
