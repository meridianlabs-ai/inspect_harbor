name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target-branch:
        description: "Maintenance branch to release from (e.g. hotfix/1.4.x). Leave as main for a normal release."
        type: string
        default: main

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: meridianlabs-ai/actions/.github/workflows/release-please-python.yml@v1
    with:
      approvers: "alexandraabbas jjallaire dragonstyle"
      target-branch: ${{ inputs.target-branch }}
    secrets: inherit

  # Publish stays in-repo (PyPI trusted publishing can't run from a cross-repo
  # reusable workflow; keeping it here leaves the trusted-publisher config for
  # workflow release.yaml unchanged).
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC/trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/inspect-harbor
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Display version
        run: |
          echo "Version: $(git describe --tags --always)"
      - name: Install dependencies
        run: |
          pip install --upgrade pip build
      - name: Build package
        run: |
          python -m build
      - name: List built packages
        run: ls -lh dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
