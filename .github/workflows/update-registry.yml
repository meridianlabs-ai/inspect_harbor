name: Update Harbor Registry Tasks

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-tasks:
    name: Generate and update registry tasks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Generate tasks
        id: generate
        run: |
          # Write workflow-only artifacts under $RUNNER_TEMP so they never
          # enter the working tree and get committed by create-pull-request.
          uv run python scripts/generate_tasks.py 2> "$RUNNER_TEMP/gen-stderr.txt"
          cat "$RUNNER_TEMP/gen-stderr.txt" >&2
          # Extract auto-stubbed dataset names (if any) for the PR body.
          # The generator logs them one-per-line as "  - name" between the
          # "auto-stubbed:" header and the "Fill in" footer.
          awk '/auto-stubbed:$/{flag=1; next} /^  Fill in/{flag=0} flag && /^  - /{sub(/^  - /,""); print}' "$RUNNER_TEMP/gen-stderr.txt" > "$RUNNER_TEMP/stubbed.txt" || true
          {
            echo "stubbed<<EOF"
            cat "$RUNNER_TEMP/stubbed.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Apply linting fixes and formatting
        run: |
          uv run ruff check --fix src/inspect_harbor/_tasks.py
          uv run ruff format src/inspect_harbor/_tasks.py

      - name: Run type checks
        run: uv run pyright src/inspect_harbor/_tasks.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/inspect_harbor/_tasks.py docs/registry-listing.yml docs/overrides.yml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          commit-message: 'fix: update Harbor registry tasks'
          title: 'fix: update Harbor registry tasks'
          body: |
            ## 🤖 Automated Update

            This PR updates the Harbor registry tasks to reflect the latest datasets available in the [Harbor registry](https://registry.harborframework.com/).

            ### Changes
            - Updated `src/inspect_harbor/_tasks.py` with latest registry datasets
            - Updated `docs/registry-listing.yml` with current dataset information

            ### ⚠️ Action required: fill in categories for new datasets

            The following datasets were added to `docs/overrides.yml` with empty `categories`. Fill in one or more categories (see vocabulary in the file's header) before merging, or the `validate-overrides` CI check will block this PR:

            ```
            ${{ steps.generate.outputs.stubbed || '(none — all datasets already had overrides)' }}
            ```

            ### 📤 After merging: publish docs

            Docs are not auto-published — the live site at https://meridianlabs-ai.github.io/inspect_harbor stays frozen until someone pushes a new `gh-pages` build. Once this PR is merged, pull `main` locally and run:

            ```bash
            cd docs
            uv run quarto publish gh-pages
            ```

            This re-renders the registry listing and per-benchmark pages against the latest Harbor registry and pushes them to the `gh-pages` branch, which GitHub Pages serves.

            ### Details
            - **Generated by**: `scripts/generate_tasks.py`
            - **Triggered by**: ${{ github.event_name }}
            - **Workflow**: ${{ github.workflow }}
          branch: update-harbor-tasks
          delete-branch: true
          labels: |
            automated
            dependencies

      # Hand the PR to the dev agent (claude.yml) to fill in the empty stubs.
      - name: Ask Claude to triage new stubs
        if: steps.git-check.outputs.changed == 'true' && steps.generate.outputs.stubbed != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          STUBBED: ${{ steps.generate.outputs.stubbed }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No PR number from create-pull-request; nothing to trigger."
            exit 0
          fi
          # Static template with a placeholder; the quoted heredoc means nothing
          # here is expanded by the shell.
          template="$(cat <<'EOF'
          @claude please triage this nightly Harbor registry-update PR.

          Read and follow `.claude/skills/nightly-pr-triage/SKILL.md`, **steps 1–7 only** — do NOT merge or publish docs (those stay manual, done by a human).

          Newly-stubbed datasets needing categories:
          ```
          __STUBBED__
          ```

          When done, post a short summary comment (what you filled; what you left and why), then post `@review` as a separate comment.
          EOF
          )"
          # Literal replacement (no command/pattern re-evaluation of $STUBBED).
          body="${template/__STUBBED__/$STUBBED}"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
