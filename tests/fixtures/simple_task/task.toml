[task]
name = "harbor-test/simple-task"
description = "A simple test task for integration testing"

# cpus / memory_mb / gpus intentionally omitted: harbor >=0.17 leaves them as
# None so the integration tests exercise our default-coalescing path.
[environment]
docker_image = "python:3.11-slim"
network_mode = "no-network"

[verifier]
timeout_sec = 60

[agent]
timeout_sec = 120
